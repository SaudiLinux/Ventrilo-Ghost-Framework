<!DOCTYPE html>
<html>
<head>
    <title>Ventrilo Ghost-C2</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; padding: 20px; }
        .card { border: 1px solid #00ff00; padding: 10px; margin: 10px; }
    </style>
</head>
<body>
    <h1>VENTRILO GHOST C2 // SayerLinux</h1>
    <div id="agents">
        {% for id, info in agents.items() %}
        <div class="card">
            Agent: {{ id }} | IP: {{ info.ip }} | OS: {{ info.os }} | <b>ONLINE</b>
        </div>
        {% endfor %}
    </div>
</body>
</html>
